  <line x1="37.5" y1="22.9" x2="48.8" y2="19.4" stroke="#00D166" stroke-width="1" opacity="0.45"/>
  <line x1="33.9" y1="33.1" x2="41.6" y2="42.9" stroke="#00D166" stroke-width="1" opacity="0.45"/>
  <line x1="22.1" y1="33.1" x2="14.4" y2="42.9" stroke="#00D166" stroke-width="1" opacity="0.45"/>
  <line x1="18.5" y1="22.9" x2="7.2"  y2="19.4" stroke="#00D166" stroke-width="1" opacity="0.45"/>

