plugins {
    id 'com.android.application'
}

android {
    namespace 'com.brasilfut.app'
    compileSdk 34

    defaultConfig {
        applicationId 'com.brasilfut.app'
        minSdk 21
        targetSdk 34
        versionCode 16
        versionName '1.6.0'
    }

    buildTypes {
        debug {
            minifyEnabled false
        }
        release {
            minifyEnabled false
            signingConfig signingConfigs.debug
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {}
